# Mosquitto Configuration for HVAC Predictive Maintenance
# ════════════════════════════════════════════════════════

# Listen on all interfaces
listener 1883
protocol mqtt

# Allow anonymous connections (for demo/lab use)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
